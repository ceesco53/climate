apiVersion: apps/v1
kind: Deployment
metadata:
  name: climate
  namespace: climate
  labels:
    app: climate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: climate
  template:
    metadata:
      labels:
        app: climate
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: climate
          image: ghcr.io/ceesco53/climate:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DB_PATH
              value: /data/climate.db
            - name: APP_HOST
              value: https://climate.ingress.realmclick.com
            - name: POLL_INTERVAL_SECONDS
              value: "300"
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: climate-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: climate-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: SDM_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: climate-secrets
                  key: SDM_PROJECT_ID
            - name: GOOGLE_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: climate-secrets
                  key: GOOGLE_REFRESH_TOKEN
                  optional: true
            - name: UPSTAIRS_DEVICE_ID
              valueFrom:
                secretKeyRef:
                  name: climate-secrets
                  key: UPSTAIRS_DEVICE_ID
                  optional: true
            - name: DOWNSTAIRS_DEVICE_ID
              valueFrom:
                secretKeyRef:
                  name: climate-secrets
                  key: DOWNSTAIRS_DEVICE_ID
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: climate-data
