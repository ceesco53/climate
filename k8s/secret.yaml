# kubectl create secret generic climate-secrets \
#   --namespace=climate \
#   --from-literal=GOOGLE_CLIENT_ID=your_client_id \
#   --from-literal=GOOGLE_CLIENT_SECRET=your_client_secret \
#   --from-literal=SDM_PROJECT_ID=your_nest_project_id \
#   --from-literal=GOOGLE_REFRESH_TOKEN=your_refresh_token \
#   --from-literal=UPSTAIRS_DEVICE_ID=your_upstairs_device_id \
#   --from-literal=DOWNSTAIRS_DEVICE_ID=your_downstairs_device_id \
#   --dry-run=client -o yaml | kubectl apply -f -
#
# Leave GOOGLE_REFRESH_TOKEN blank on first deploy — visit
# https://climate.ingress.realmclick.com/api/auth/start to authorize
# and the token is stored automatically in the database.
#
# Get device IDs after first auth: curl https://climate.ingress.realmclick.com/api/devices
apiVersion: v1
kind: Secret
metadata:
  name: climate-secrets
  namespace: climate
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  SDM_PROJECT_ID: ""
  GOOGLE_REFRESH_TOKEN: ""
  UPSTAIRS_DEVICE_ID: ""
  DOWNSTAIRS_DEVICE_ID: ""
